# claude-worker pnpm workspace. packages/ + apps/ with `workspace:*` deps SYMLINKED
# (linkWorkspacePackages), and each publishable package exposes a `@claude-worker/source`
# export condition so apps resolve straight to TS source (packages/*/src) in dev with no build
# step. Packages build to build/ via tsdown only on prepack/CI (never in dev). Turbo orchestrates.
packages:
  - packages/*
  - apps/*
linkWorkspacePackages: true

allowBuilds:
  esbuild: true
  '@swc/core': true
  # sharp: Astro's default image service (apps/docs). Prebuilt binaries fetched on install.
  sharp: true

minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk@0.3.217'
